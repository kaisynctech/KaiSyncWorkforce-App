name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
env:
  DOTNET_VERSION: '10.0.x'
  PROJECT: KaiFlow.Timesheets.Maui/KaiFlow.Timesheets.Maui.csproj
jobs:
  gate-build:
    name: Gate 1 — Build (Windows + Android)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Install MAUI workloads
        run: dotnet workload install maui-windows maui-android
      - name: Build Windows
        run: dotnet build ${{ env.PROJECT }} -f net10.0-windows10.0.19041.0 -c Release --no-restore
      - name: Build Android
        run: dotnet build ${{ env.PROJECT }} -f net10.0-android -c Release --no-restore
  gate-tests:
    name: Gate 2 — Unit Tests
    runs-on: ubuntu-latest
    needs: gate-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Test Timesheets
        run: dotnet test KaiFlow.Timesheets.Tests/KaiFlow.Timesheets.Tests.csproj -c Release --logger trx
      - name: Test Finance
        run: dotnet test KaiFlow.Finance.Tests/KaiFlow.Finance.Tests.csproj -c Release --logger trx
      - name: Test Payroll
        run: dotnet test KaiFlow.Payroll.Tests/KaiFlow.Payroll.Tests.csproj -c Release --logger trx
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/*.trx'
  gate-migration-equivalence:
    name: Gate 3 — Migration Equivalence
    runs-on: ubuntu-latest
    needs: gate-build
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: vcivtjwreybaxgtdhtou
    steps:
      - uses: actions/checkout@v4
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Run equivalence check
        run: python3 .github/scripts/check_migration_equivalence.py
  gate-fingerprint:
    name: Gate 4 — Schema Fingerprint
    runs-on: ubuntu-latest
    needs: gate-migration-equivalence
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_STAGING_DB_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Install psql client
        run: sudo apt-get install -y postgresql-client
      - name: Apply local migrations to staging
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase db push --db-url "$SUPABASE_DB_URL" --include-all
      - name: Compute staging fingerprint
        run: |
          psql "$SUPABASE_DB_URL" \
            -f .github/scripts/schema_fingerprint.sql \
            --no-align --tuples-only \
            > staging_fingerprint.txt
      - name: Compare against production fingerprint
        run: |
          if ! diff -u KaiFlow.Timesheets.Maui/supabase/production_fingerprint.txt staging_fingerprint.txt; then
            echo "::error::Schema fingerprint mismatch — staging schema does not match production."
            exit 1
          fi
          echo "Fingerprints match."
  gate-anon-grants:
    name: Gate 5 — No New Anon Grants on SECURITY DEFINER Functions
    runs-on: ubuntu-latest
    needs: gate-migration-equivalence
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_PRODUCTION_DB_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Install psql client
        run: sudo apt-get install -y postgresql-client
      - name: Check for anon grants
        run: |
          VIOLATIONS=$(psql "$SUPABASE_DB_URL" \
            -f .github/scripts/check_anon_grants.sql \
            --no-align --tuples-only)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::SECURITY DEFINER functions with anon grants found:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "No violations found."
